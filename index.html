<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>DJORDANCOMD — Links</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html { min-width: 320px; background: #0b0b0c; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 42px 18px;
      color: #f5f5f5;
      background: radial-gradient(circle at 50% 0, #202522 0, #111312 34%, #090a0a 78%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: min(100%, 510px);
      padding: 38px;
      text-align: center;
      border: 1px solid #292b2a;
      border-radius: 24px;
      background: rgba(15,16,16,.95);
      box-shadow: 0 24px 70px rgba(0,0,0,.35);
    }
    .profile { margin-bottom: 28px; }
    .avatar-wrap {
      width: 112px;
      height: 112px;
      margin: 0 auto 20px;
      padding: 2px;
      border: 1px solid #3b3e3c;
      border-radius: 50%;
      background: #171918;
    }
    .avatar { display: block; width: 100%; height: 100%; object-fit: cover; border: 4px solid #101111; border-radius: 50%; }
    h1 { margin: 0; font-size: clamp(36px, 8vw, 48px); line-height: 1; font-weight: 800; letter-spacing: -.055em; }
    .username { display: block; margin-top: 10px; color: #686d6a; font-size: 11px; font-weight: 600; letter-spacing: .04em; }
    nav { display: grid; gap: 9px; }
    .link {
      display: flex;
      align-items: center;
      min-height: 62px;
      padding: 9px 13px;
      text-align: left;
      color: inherit;
      text-decoration: none;
      border: 1px solid #282a29;
      border-radius: 13px;
      background: #151616;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .link:hover, .link:focus-visible { outline: none; transform: translateY(-1px); border-color: #505451; background: #1b1d1c; }
    .mark { flex: 0 0 40px; height: 40px; display: grid; place-items: center; border: 1px solid #303331; border-radius: 10px; background: #0e0f0f; color: #e7e9e8; font-size: 10px; font-weight: 800; }
    .copy { display: grid; gap: 3px; margin-left: 13px; }
    .copy strong { font-size: 14px; font-weight: 650; }
    .copy small { color: #6f7471; font-size: 10px; }
    .arrow { margin-left: auto; color: #656a67; font-size: 15px; }
    .email { margin-top: 13px; border-color: #3b403d; background: #1a1d1b; }
    .email .mark { color: #111312; background: #e8ece9; font-size: 18px; }
    footer { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 23px; color: #505451; font-size: 7px; font-weight: 700; letter-spacing: .14em; }
    footer i { width: 3px; height: 3px; border-radius: 50%; background: #575c59; }
    @media (max-width: 540px) {
      body { align-items: start; padding: 12px 9px; }
      .card { padding: 27px 15px 21px; border-radius: 20px; }
      .profile { margin-bottom: 22px; }
      .avatar-wrap { width: 98px; height: 98px; }
      h1 { font-size: clamp(33px, 11vw, 40px); }
      .link { min-height: 58px; padding: 8px 11px; }
      .mark { flex-basis: 38px; height: 38px; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition-duration: .01ms !important; } }
  </style>
